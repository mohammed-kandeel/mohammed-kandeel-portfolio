<section id="skills" class="main-section">
  <!-- Background -->
  <div class="pointer-events-none absolute inset-0 z-0">
    <div
      class="bg-secondary-500/10 absolute top-[10%] right-[-10%] h-[40vw] w-[40vw] rounded-full blur-[120px]"
    ></div>
    <div
      class="absolute bottom-[0%] left-[-10%] h-[50vw] w-[50vw] rounded-full bg-purple-600/10 blur-[140px]"
    ></div>
  </div>

  <div class="relative z-10 container mt-4">
    <!-- Header -->
    <Header #headRef class="mt-4 mb-10 text-center opacity-0">
      <div
        class="bg-secondary-900 border-secondary-800 text-secondary-400 mb-4 inline-flex items-center rounded-md border px-3 py-1 text-xs font-medium"
      >
        02 // SKILLS
      </div>
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Technical Skills</h2>
      <p class="mx-auto mt-3 max-w-xl text-slate-400">
        Technologies and concepts I use to build scalable, high-performance Angular applications
      </p>
    </Header>

    <!-- Grid -->
    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
      <!-- Angular -->
      @for (card of skillsCards; track $index) {
        <div
          #skillsCardsRef
          class="group rounded-2xl border border-white/10 bg-white/5 p-6 opacity-0 backdrop-blur-md transition-all duration-300 hover:-translate-y-2 hover:border-cyan-400/30 hover:shadow-lg hover:shadow-cyan-500/10"
        >
          <h3 [class]="card.color" class="mb-4 flex items-center gap-3 text-lg font-semibold">
            <i [class]="card.icon"></i>
            {{ card.title }}
          </h3>

          <div class="flex flex-wrap gap-2">
            @for (skill of card.skills; track $index) {
              <span
                class="group-hover:bg-primary-500/10 rounded-full border border-white/10 bg-white/10 px-3 py-1 text-sm text-slate-300 transition group-hover:border-cyan-400/20 group-hover:text-cyan-300"
              >
                {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
