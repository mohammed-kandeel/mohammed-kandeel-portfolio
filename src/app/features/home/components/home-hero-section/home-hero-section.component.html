<section id="home" class="main-section border-0">
  <!-- Background -->
  <div class="pointer-events-none absolute inset-0 z-0 overflow-hidden">
    <div
      class="bg-secondary-500/15 pointer-events-none absolute top-[20%] left-[-10%] h-[50vw] w-[50vw] rounded-full blur-[120px]"
    ></div>
  </div>

  <div class="container grid grid-cols-1 items-center gap-10 md:grid-cols-3">
    <!-- info -->
    <div #info class="text-center opacity-0 transition-all duration-300 md:col-span-2 md:text-left">
      <Header>
        <span class="text-secondary-400 text-sm tracking-wider uppercase"> Hi, I'm </span>

        <h1
          class="text-linear via-primary-200 from-white to-gray-400 bg-clip-text text-3xl leading-tight font-extrabold text-transparent md:text-5xl lg:text-6xl"
        >
          Mohamed Kandeel
        </h1>

        <p
          class="text-linear from-secondary-400 to-primary-500 mb-4 via-blue-500 bg-clip-text text-2xl leading-tight font-bold text-transparent md:text-4xl lg:text-5xl"
        >
          Angular Frontend Developer
        </p>
      </Header>

      <!-- Paragraph -->
      <div>
        <p class="mx-auto mb-6 max-w-xl text-lg leading-relaxed text-gray-300 md:mx-0">
          I build responsive and scalable web applications using Angular and modern frontend
          technologies. Focused on clean architecture, performance, and creating smooth user
          experiences.
        </p>

        <!-- Buttons -->
        <div class="mb-6 flex flex-wrap justify-center gap-4 md:justify-start">
          <!-- Download CV -->
          <a [href]="sociol().cv" target="_blank" title="download cv" class="main-btn">
            <i class="fa-solid fa-download"></i> Download CV
          </a>

          <!-- Contact -->
          <button
            (click)="onScrollToSection('contact')"
            class="hover:bg-secondary-500 rounded-full border border-cyan-500 px-6 py-3 font-semibold text-cyan-400 transition-all duration-300 hover:text-white"
          >
            <i class="fa-solid fa-paper-plane"></i> Contact Me
          </button>
        </div>

        <!-- Social Icons -->
        <div class="flex justify-center gap-5 text-xl md:justify-start">
          @for (item of links; track $index) {
            <a
              [href]="item.link"
              target="_blank"
              class="border-primary-500 hover:text-secondary-500 hover:bg-primary-500 flex h-10 w-10 items-center justify-center rounded-2xl border text-gray-400 transition-all duration-300 hover:-translate-y-0.5"
              [title]="item.title"
            >
              <i [class]="item.icon"></i>
            </a>
          }
        </div>
      </div>
    </div>

    <!-- Image -->
    <div #image class="flex justify-center opacity-0 transition-all duration-300 md:justify-start">
      <div class="o relative z-1 max-w-64 rounded-full md:max-w-72">
        <div class="shadow-secondary-600/60 absolute inset-0 rounded-full shadow-2xl"></div>
        <div
          class="border-primary-600 bg-primary-600 relative aspect-square overflow-hidden rounded-full border-[6px]"
        >
          <img
            src="/assets/images/my-image-1.jpg"
            class="h-full w-full scale-110 object-cover object-top"
            alt="Mohamed Kandeel"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Explore More -->
  <div class="absolute bottom-10 left-1/2 hidden -translate-x-1/2 md:block">
    <button
      (click)="onScrollToSection('about')"
      class="flex animate-bounce flex-col items-center text-gray-400 transition hover:text-cyan-400"
    >
      <span class="mb-1 text-sm">Explore More</span>
      <i class="fa-solid fa-chevron-down"></i>
    </button>
  </div>
</section>
